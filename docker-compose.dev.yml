version: "3.9"

services:
  db:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - backend_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  backend_postgres_data:
